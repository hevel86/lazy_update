---
- name: Technitium DNS Maintenance
  hosts: "{{ target_hosts | default('dns_servers') }}"
  serial: 1  # Updates one host at a time
  become: true
  vars:
    install_dir: "/opt/technitium/dns"
    version_file: "/root/.technitium"
    download_url: "https://download.technitium.com/dns/DnsServerPortable.tar.gz"

  tasks:
    - name: Get latest Technitium version
      ansible.builtin.shell: "curl -fsSL https://technitium.com/dns/ | sed -n 's/.*Version \\([0-9.]\\+\\).*/\\1/p'"
      register: latest_version_check
      changed_when: false
      run_once: true
      delegate_to: localhost
      become: false

    - name: Get installed Technitium version
      ansible.builtin.command: "cat {{ version_file }}"
      register: installed_version_check
      failed_when: false
      changed_when: false

    - name: Set version facts
      ansible.builtin.set_fact:
        latest_version: "{{ latest_version_check.stdout | trim }}"
        installed_version: "{{ installed_version_check.stdout | trim | default('0.0.0', true) }}"

    - name: Detect active Technitium service name
      ansible.builtin.shell: "systemctl list-units --type=service --state=active | grep -E '(technitium|dns).service' | awk '{print $1}' | head -n 1 | sed 's/.service//'"
      register: detected_service
      changed_when: false
      failed_when: false

    - name: Set service name fact
      ansible.builtin.set_fact:
        service_name: "{{ detected_service.stdout | default('dns', true) }}"

    - name: Display environment info
      ansible.builtin.debug:
        msg: "Host: {{ inventory_hostname }} | Installed: {{ installed_version }} | Latest: {{ latest_version }} | Service: {{ service_name }}"

    - name: Ensure .NET 10 Runtime and ICU are installed
      block:
        - name: Check if .NET 10 is installed
          ansible.builtin.shell: "dotnet --list-runtimes | grep 'Microsoft.NETCore.App 10.0'"
          register: dotnet_check
          failed_when: false
          changed_when: false

        - name: Install dependencies if .NET 10 is missing
          block:
            - name: Install ICU package (Debian/Ubuntu)
              ansible.builtin.apt:
                name: libicu-dev
                state: present
                update_cache: yes

            - name: Download Microsoft repository configuration
              ansible.builtin.get_url:
                url: "https://packages.microsoft.com/config/{{ ansible_distribution | lower }}/{{ (ansible_distribution == 'Debian') | ternary(ansible_distribution_major_version, ansible_distribution_version) }}/packages-microsoft-prod.deb"
                dest: "/tmp/packages-microsoft-prod.deb"
              register: repo_deb

            - name: Install Microsoft repository configuration
              ansible.builtin.apt:
                deb: "/tmp/packages-microsoft-prod.deb"

            - name: Update apt cache and install ASP.NET Core Runtime 10.0
              ansible.builtin.apt:
                name: aspnetcore-runtime-10.0
                state: present
                update_cache: yes
          when: dotnet_check.rc != 0
      when: installed_version != latest_version

    - name: Update Technitium DNS
      block:
        - name: Stop Technitium DNS service
          ansible.builtin.systemd:
            name: "{{ service_name }}"
            state: stopped

        - name: Ensure installation directory exists
          ansible.builtin.file:
            path: "{{ install_dir }}"
            state: directory
            mode: '0755'

        - name: Download and extract new version
          ansible.builtin.unarchive:
            src: "{{ download_url }}"
            dest: "{{ install_dir }}"
            remote_src: yes

        - name: Update version file
          ansible.builtin.copy:
            content: "{{ latest_version }}"
            dest: "{{ version_file }}"
            mode: '0644'

        - name: Start Technitium DNS service
          ansible.builtin.systemd:
            name: "{{ service_name }}"
            state: started
            daemon_reload: yes

        - name: Wait for DNS service to be ready (Port 53)
          ansible.builtin.wait_for:
            port: 53
            delay: 10
            timeout: 60
            host: "127.0.0.1"

        - name: Verify Web UI is reachable (Health Check)
          ansible.builtin.uri:
            url: "http://127.0.0.1:5380"
            status_code: 200
            timeout: 15
          register: health_check
          retries: 5
          delay: 5
          until: health_check.status == 200

      when: installed_version != latest_version
